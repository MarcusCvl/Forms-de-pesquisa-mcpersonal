<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formulario MTECH
        
    </title>
</head>
<body>
    <header>
        <h1>Formulário de Desempenho MTECH</h1>
    </header>
    <section >
        <form action ="" method = "get"><!-- method get pega os dados e envia na URL. o methodo post envia os dados como um reader em requisição ao backend -->   
            <fieldset>
                <legend>Dados Pessoais</legend>
                <label for = "name">Nome:</label>
                <input id="name" type = "text" name = "userName" placeholder="Nome" required>
            
                 <br>
                <label for = "age">Idade:</label>
                <input id="age" type = "number" name = "userAge" placeholder="Idade" min = "12" max = "100" required>

                <br>
                <label for = "birth">Data de Nascimento:</label>
                <input id="birth" type = "date" name = "birthDate">

                <br>
                <label for = "email">Email:</label>
                <input id="email" type = "email" name = "userEmail" placeholder="Email" required>

                <br>
                <label for="phoneNumber">Telefone:</label>
                <input id="phoneNumber" type="tel" name="userPhoneNumber" placeholder = "DDD+Numero sem simbolos" pattern = [0-9]{11} required >

                <br>
                <label for="image"> Upload de foto</label>
                <input id="image" type = "file" name = "userImage" accept="image/*">
            </fieldset>
            <fieldset>
                <legend>Perfil</legend>
                <p>Gênero :</p>
                <input id="masc"type = "radio" name = "userGender" value = "masculino">
                <label for = "masc">Masculino</label>

                <input id="fem"type = "radio" name = "userGender" value = "feminino">
                <label for = "fem">Feminino</label>

                <input id="notInformed"type = "radio" name = "userGender" value = "notInformed">
                <label for = "notInformed">Prefiro não informar</label>
                <br>
                
                <label for="status">Estado Civil :</label>
                <select id="status" name="maritalStatus">
                    <option value="notInformed">Selecione</option>
                    <option value="Casado">Casado</option>
                    <option value="Solteiro">Solteiro</option>
                    <option value="Divorciado">Divorciado</option>
                    <option value="casado">União estavel</option>
                </select>

                <br>
                <label for="state">Estado :</label>
                
                <select id="state" name="userState" required>

                    <option value="acre">Acre</option>
                    <option value="alagoas">Alagoas</option>
                    <option value="amapa">Amapá</option>
                    <option value="amazonas">Amazonas</option>
                    <option value="bahia">Bahia</option>
                    <option value="ceara">Ceará</option>
                    <option value="distrito-federal">Distrito Federal</option>
                    <option value="espirito-santo">Espírito Santo</option>
                    <option value="goias">Goiás</option>
                    <option value="maranha">Maranhão</option>
                    <option value="mato-grosso">Mato Grosso</option>
                    <option value="mato-grosso-do-sul">Mato Grosso do Sul</option>
                    <option value="minas-gerais">Minas Gerais</option>
                    <option value="para">Pará</option>
                    <option value="paraiba">Paraíba</option>
                    <option value="parana">Paraná</option>
                    <option value="pernambuco">Pernambuco</option>
                    <option value="piaui">Piauí</option>
                    <option value="rio-de-janeiro">Rio de Janeiro</option>
                    <option value="rio-grande-do-norte">Rio Grande do Norte</option>
                    <option value="rio-grande-do-sul">Rio Grande do Sul</option>
                    <option value="rondonia">Rondônia</option>
                    <option value="roraima">Roraima</option>
                    <option value="santa-catarina">Santa Catarina</option>
                    <option value="sao-paulo">São Paulo</option>
                    <option value="sergipe">Sergipe</option>
                    <option value="tocantins">Tocantins</option>
                </select>
                <br><label for="city">Cidade :</label>
                <input id="city" type = "text" name = "userCity" placeholder = "Digite sua cidade">
            </fieldset>
            <fieldset>
            
                <legend>Hábitos</legend>
                <p>Você pratica exercícios físicos regularmente?</p>
                <input id="exerciseYes" type = "radio" name = "exerciseHabits" value = "sim">
                <label for = "exerciseYes">Sim</label>
                <input id="exerciseNo" type = "radio" name = "exerciseHabits" value = "nao">
                <label for = "exerciseNo">Não</label><br>
                <p>Quantos dias por semana você pratica exercícios físicos?</p>
                
                <input id="frequencia"type = "number" name = "exerciseFrequency" min = "0" max = "7">
                <label for = "frequencia">Dias por semana:</label>

                <p>Marque quais atividades físicas você pratica:</p>
                <input id = "corrida" type="checkbox" name="exerciseType" value="corrida">
                <label for = "corrida">Corrida</label>
                <br>
                <input id = "natacao" type="checkbox" name="exerciseType" value="natacao">
                <label for = "natacao">Natação</label>
                <br>
                <input id = "ciclismo" type="checkbox" name="exerciseType" value="ciclismo">
                <label for = "ciclismo">Ciclismo</label>
                <br>
                <input id = "musculacao" type="checkbox" name="exerciseType" value="musculacao">
                <label for = "musculacao">Musculação</label>
                <br>
                <input id = "ginastica" type="checkbox" name="exerciseType" value="ginastica">
                <label for = "ginastica">Ginástica</label>
                <br>
                <input id = "yoga" type="checkbox" name="exerciseType" value="yoga">
                <label for = "yoga">Yoga</label>
                <br>
                <input id = "futebol" type="checkbox" name="exerciseType" value="futebol">  
                <label for = "futebol">Futebol</label>
                <br>
                <input id = "outros" type="checkbox" name="exerciseType" value="outros">
                <label for = "outros">Outros</label><br>

                <label for="otherexercise">Caso outros, por favor especifique:</label>
                <input list="exerciseOptions" id="otherexercise" name="userotherexercise" type="text">
                <datalist id="exerciseOptions">
                    <option value="exercicio-funcional">
                    <option value="cardio">
                    <option value="esporte-alternativo">
                    <option value="artes-marciais">
                </datalist>
 
            </fieldset>
            <button type="submit">Enviar</button>            
        </form>
    </section>
    
</body>
</html>
