<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formulario MTECH
        
    </title>
</head>
<body>
    <header>
        <h1>Formulário de Desempenho MTECH</h1>
    </header>
    <section >
        <form action ="" method = "get"><!-- method get pega os dados e envia na URL. o methodo post envia os dados como um reader em requisição ao backend -->   
            <fieldset>
                <legend>Dados Pessoais</legend>
                <label for = "userName">Nome:</label>
                <input type = "text" name = "userName" placeholder="Nome" required>
            
                 <br>
                <label for = "userAge">Idade:</label>
                <input type = "number" name = "userAge" placeholder="Idade" min = "12" max = "100" required>

                <br>
                <label for = "birthDate">Data de Nascimento:</label>
                <input type = "date" name = "birthDate">

                <br>
                <label for = "userEmail">Email:</label>
                <input type = "email" name = "userEmail" placeholder="Email" required>

                <br>
                <label for="userPhoneNumber">Telefone:</label>
                <input type="tel" name="userPhoneNumber" placeholder = "DDD+Numero sem simbolos" pattern = [0-9]{11} required >

                <br>
                <label for="userImage"> Upload de foto</label>
                <input type = "file" name = "userImage" accept="image/*">

            </fieldset>
            <button type="submit">Enviar</button>            
        </form>
    </section>
    
</body>
</html>
